<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | daruks.com</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link rel="stylesheet" href="/styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- AOS: Animate On Scroll -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- meta -->
    <meta property="og:site_name" content="daruks.com">
    <meta property="og:title" content="Home - daruks Home Page">
    <meta property="og:description" content="Welcome to Home Page of darui3018823!">
    <meta property="og:url" content="https://daruks.com/">
    <meta property="og:type" content="website">

    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(rgba(8, 14, 20, 0.55), rgba(8, 14, 20, 0.7)), url('/images/bg-beach.jpg') center / cover no-repeat fixed;
        }

        /* Liquid Glass hero card */
        .liquid-glass {
            position: relative;
            isolation: isolate;
            background: rgba(20, 22, 28, 0.1);
            backdrop-filter: blur(8px) saturate(130%);
            -webkit-backdrop-filter: blur(8px) saturate(130%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2.5rem;
            box-shadow:
                0 12px 40px -8px rgba(0, 0, 0, 0.35),
                inset 0 1px 1px rgba(255, 255, 255, 0.25);
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(125deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0) 35%);
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .glass-icon-btn {
            width: 3.25rem;
            height: 3.25rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), 0 4px 12px rgba(0, 0, 0, 0.25);
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .glass-icon-btn:hover {
            transform: translateY(-3px) scale(1.06);
            background: rgba(255, 255, 255, 0.18);
        }

        .glass-icon-btn img {
            width: 1.5rem;
            height: 1.5rem;
            object-fit: contain;
            border-radius: 0.375rem;
        }
    </style>
</head>

<body class="text-white min-h-screen">
    <!-- Navbar -->
    <header class="fixed top-0 w-full bg-gray-950/70 backdrop-blur shadow z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-semibold tracking-wide">daruks.com</a>
            <button id="hamburger" class="md:hidden text-2xl">&#9776;</button>
            <nav id="navMenu" class="hidden md:flex space-x-6 text-sm">
                <a href="/about/" class="hover:text-cyan-300 transition">About</a>
                <a href="/projects/" class="hover:text-cyan-300 transition">Projects</a>
                <a href="/links/" class="hover:text-cyan-300 transition">Links</a>
                <a href="/contact/" class="hover:text-cyan-300 transition">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Mobile menu modal -->
    <div id="menuModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-50">
        <div
            class="bg-white/30 text-white backdrop-blur-md rounded-lg p-6 w-full max-w-md shadow-lg border border-white/20">
            <h2 class="text-lg font-semibold mb-4">メニュー</h2>
            <ul class="space-y-3">
                <li><a href="/about/" class="block bg-white/20 text-white p-2 rounded hover:bg-white/30">About</a></li>
                <li><a href="/projects/" class="block bg-white/20 text-white p-2 rounded hover:bg-white/30">Projects</a></li>
                <li><a href="/links/" class="block bg-white/20 text-white p-2 rounded hover:bg-white/30">Links</a></li>
                <li><a href="/contact/" class="block bg-white/20 text-white p-2 rounded hover:bg-white/30">Contact</a></li>
            </ul>
            <div class="mt-4 text-right">
                <button id="closeMenuModal" class="px-4 py-2 text-sm bg-gray-500 hover:bg-gray-400 rounded">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="min-h-screen flex flex-col items-center justify-center text-center px-4">
        <!-- Liquid Glass hero -->
        <div class="w-full flex justify-center">
            <div class="liquid-glass w-full max-w-2xl px-8 py-10 md:px-16 md:py-14">
                <h1 class="text-3xl md:text-5xl font-bold">
                    Welcome to daruks.com</h1>
                <p class="mt-4 text-base md:text-xl text-slate-300">
                    Make now this page :)</p>
                <div class="flex justify-center gap-4 mt-8">
                    <a href="https://github.com/darui3018823/" target="_blank" rel="noopener" class="glass-icon-btn" aria-label="GitHub">
                        <img src="https://github.com/favicon.ico" alt="">
                    </a>
                    <a href="https://twitter.com/darui3018823" target="_blank" rel="noopener" class="glass-icon-btn" aria-label="Twitter">
                        <img src="https://twitter.com/favicon.ico" alt="">
                    </a>
                    <a href="https://bot.daruks.com/" target="_blank" rel="noopener" class="glass-icon-btn" aria-label="This is bot">
                        <img src="https://cdn.daruks.com/profile/icon/thisisbot_icon.png" alt="">
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-xs text-slate-400">
        &copy; 2024 - 2026 darui3018823 — All rights reserved.
    </footer>

    <!-- AOS init -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            offset: 0,
            once: true,
            duration: 800
        });
    </script>
    <!-- Load Script -->
    <script src="script.js"></script>
</body>

</html>
