<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | daruks.com</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link rel="stylesheet" href="/styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- AOS: Animate On Scroll -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- meta -->
    <meta property="og:site_name" content="daruks.com">
    <meta property="og:title" content="Home - daruks Home Page">
    <meta property="og:description" content="Welcome to Home Page of darui3018823!">
    <meta property="og:url" content="https://daruks.com/">
    <meta property="og:type" content="website">

    <style>
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(rgba(8, 14, 20, 0.55), rgba(8, 14, 20, 0.7)), url('/images/bg-beach.jpg') center / cover no-repeat fixed;
            overflow-x: hidden;
        }

        body.is-menu-open {
            overflow: hidden;
        }

        /* Liquid Glass hero card */
        .liquid-glass {
            position: relative;
            isolation: isolate;
            background: rgba(20, 22, 28, 0.01);
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 2.5rem;
            box-shadow:
                0 12px 40px -8px rgba(0, 0, 0, 0.12),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        body.is-menu-open .liquid-glass {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(125deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 35%);
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .glass-icon-btn {
            width: 1.75rem;
            height: 1.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s ease, opacity 0.25s ease;
        }

        .glass-icon-btn:hover {
            transform: translateY(-3px) scale(1.06);
            opacity: 0.8;
        }

        .glass-icon-btn img {
            width: 1.75rem;
            height: 1.75rem;
            object-fit: contain;
            border-radius: 0.375rem;
        }

        .menu-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 70;
            width: 2.75rem;
            height: 2.75rem;
            display: grid;
            place-items: center;
            color: white;
            font-size: 1.75rem;
            line-height: 1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        .menu-toggle:hover {
            opacity: 0.82;
            transform: translateY(-2px);
        }

        .menu-toggle:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.75);
            outline-offset: 4px;
        }

        .menu-backdrop {
            position: fixed;
            inset: 0;
            z-index: 55;
            background: rgba(0, 0, 0, 0.08);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .side-panel {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 60;
            width: min(22rem, calc(100vw - 2rem));
            height: 100vh;
            padding: 5rem 2rem 2rem;
            background: rgba(15, 18, 25, 0.25);
            backdrop-filter: blur(14px) saturate(115%);
            -webkit-backdrop-filter: blur(14px) saturate(115%);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: -18px 0 45px rgba(0, 0, 0, 0.22);
            transform: translateX(100%);
            transition: transform 0.35s ease;
        }

        body.is-menu-open .menu-backdrop {
            opacity: 1;
            pointer-events: auto;
        }

        body.is-menu-open .side-panel {
            transform: translateX(0);
        }

        .side-panel nav {
            display: grid;
            gap: 1rem;
        }

        .side-panel a {
            display: block;
            padding: 0.75rem 0;
            font-size: 1.125rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .side-panel a:hover {
            opacity: 0.75;
            transform: translateX(4px);
        }

        @media (max-width: 640px) {
            .menu-toggle {
                top: 1rem;
                right: 1rem;
            }

            .side-panel {
                width: min(20rem, calc(100vw - 1rem));
                padding-inline: 1.5rem;
            }
        }
    </style>
</head>

<body class="text-white min-h-screen">
    <button id="hamburger" class="menu-toggle" type="button" aria-label="メニューを開く" aria-controls="sidePanel" aria-expanded="false">&#9776;</button>
    <div id="menuBackdrop" class="menu-backdrop" aria-hidden="true"></div>
    <aside id="sidePanel" class="side-panel" aria-label="Site menu">
        <nav>
            <a href="/about/">About</a>
            <a href="/projects/">Projects</a>
            <a href="/links/">Links</a>
            <a href="/contact/">Contact</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="min-h-screen flex flex-col items-center justify-center text-center px-4">
        <!-- Liquid Glass hero -->
        <div class="w-full flex justify-center">
            <div class="liquid-glass w-full max-w-2xl px-8 py-10 md:px-16 md:py-14">
                <h1 class="text-3xl md:text-5xl font-bold">
                    Welcome to daruks.com</h1>
                <p class="mt-4 text-base md:text-xl text-slate-300">
                    Make now this page :)</p>
                <div class="flex justify-center gap-4 mt-8">
                    <a href="https://github.com/darui3018823/" target="_blank" rel="noopener" class="glass-icon-btn" aria-label="GitHub">
                        <img src="https://github.com/favicon.ico" alt="">
                    </a>
                    <a href="https://twitter.com/darui3018823" target="_blank" rel="noopener" class="glass-icon-btn" aria-label="Twitter">
                        <img src="https://twitter.com/favicon.ico" alt="">
                    </a>
                    <a href="https://bot.daruks.com/" target="_blank" rel="noopener" class="glass-icon-btn" aria-label="This is bot">
                        <img src="https://cdn.daruks.com/profile/icon/thisisbot_icon.png" alt="">
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-xs text-slate-400">
        &copy; 2024 - 2026 darui3018823 — All rights reserved.
    </footer>

    <!-- AOS init -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            offset: 0,
            once: true,
            duration: 800
        });
    </script>
    <!-- Load Script -->
    <script src="script.js"></script>
</body>

</html>
