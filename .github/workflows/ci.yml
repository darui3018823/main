name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm lint

  css:
    name: Tailwind CSS build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Tailwind CSS
        run: pnpm css build
      - name: Detect stale Tailwind CSS output
        id: generated
        run: |
          if [ -n "$(git status --porcelain -- dist/output.css)" ]; then
            git --no-pager diff --stat -- dist/output.css
            printf 'dist/output.css\n' > generated-files.txt
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Save stale output marker
        if: steps.generated.outputs.stale == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: generated-assets-css
          path: generated-files.txt
          retention-days: 1
      - name: Verify dist/output.css is up to date
        if: steps.generated.outputs.stale == 'true'
        run: |
          echo "::error::dist/output.css is stale. Run 'pnpm css build' and commit the result."
          exit 1

  contact:
    name: Contact app build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build contact app
        run: pnpm contact:build
      - name: Detect stale contact app output
        id: generated
        run: |
          if [ -n "$(git status --porcelain -- contact/)" ]; then
            git status --short -- contact/
            printf 'contact/\n' > generated-files.txt
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Save stale output marker
        if: steps.generated.outputs.stale == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: generated-assets-contact
          path: generated-files.txt
          retention-days: 1
      - name: Verify contact/ build output is up to date
        if: steps.generated.outputs.stale == 'true'
        run: |
          echo "::error::contact/ is stale or was edited by hand. Edit contact-app/ sources, run 'pnpm contact:build', and commit the result."
          exit 1
